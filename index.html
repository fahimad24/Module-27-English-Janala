<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Janala | Vocabolary learning platform</title>

    <!-- Tailwind + Daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font = pophin + Hind Siliguri -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Font-Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Coustom Css -->
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body class="poppins">
    <header>
      <nav class="bg-[#badeff4d] shadow-sm">
        <div class="navbar container mx-auto lg:justify-between">
          <div class="navbar-start">
            <div class="dropdown">
              <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h8m-8 6h16"
                  />
                </svg>
              </div>
              <ul
                tabindex="-1"
                class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow space-y-3"
              >
                <li>
                  <button class="btn btn-outline btn-primary border-2">
                    <i class="fa-solid fa-circle-question"></i>
                    FAQ
                  </button>
                </li>
                <li>
                  <button class="btn btn-outline btn-primary border-2">
                    <i class="fa-solid fa-graduation-cap"></i>
                    Learn
                  </button>
                </li>
                <li>
                  <button class="btn btn-outline btn-primary border-2">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    LogOut
                  </button>
                </li>
              </ul>
            </div>
            <a class="btn btn-ghost text-xl"
              ><span>English</span
              ><img
                src="./assets/logo.png"
                alt="English Janala Logo"
                class="w-8 ml-2"
              />
              <span class="hind_siliguri">জানালা</span>
            </a>
          </div>

          <!-- Show for learger device -->
          <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1 gap-4">
              <li>
                <button class="btn btn-outline btn-primary border-2">
                  <i class="fa-solid fa-circle-question"></i>
                  FAQ
                </button>
              </li>
              <li>
                <button class="btn btn-outline btn-primary border-2">
                  <i class="fa-solid fa-graduation-cap"></i>
                  Learn
                </button>
              </li>
              <li>
                <button class="btn btn-outline btn-primary border-2">
                  <i class="fa-solid fa-arrow-right-from-bracket"></i>
                  LogOut
                </button>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <!-- Hero Section -->
      <section>
        <div
          class="container mx-auto flex flex-col-reverse lg:flex-row items-center gap-12 py-20"
        >
          <div class="space-y-8 flex-1">
            <div class="space-y-6">
              <h1 class="text-5xl font-bold">
                <span class="text-sky-500">English</span> is Easy!!
              </h1>
              <p class="hind_siliguri text-neutral-500 max-w-md">
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন
                অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে
                নিয়ে যাবে অন্য একটি Level এ
              </p>
            </div>
            <form class="flex flex-col space-y-5">
              <div class="flex flex-col space-y-2">
                <label class="label">Email</label>
                <input type="email" class="input" placeholder="Email" />
              </div>
              <div class="flex flex-col space-y-2">
                <label class="label">Password</label>
                <input type="password" class="input" placeholder="Password" />
              </div>
              <div>
                <button class="btn btn-primary mt-4 px-12">Get Started</button>
              </div>
            </form>
          </div>
          <div class="flex-1">
            <img
              src="./assets/hero-student.png"
              alt="Hero Image"
              class="w-full max-w-md mx-auto"
            />
          </div>
        </div>
      </section>
    </header>

    <script src="./scripts/main.js"></script>
  </body>
</html>
